version 12.2
service timestamps log datetime msec
service timestamps debug datetime msec
service password-encryption
!
hostname BORDER-GW-LIMA
! --- INTERFAZ HACIA LA NUBE ------
interface GigabitEthernet8/0
 description ENLACE-HACIA-INTERNET
 ip address 200.48.1.1 255.255.255.252
 ip nat outside
! ---- INTERFAZ HACIA LA OLT (SWITCH 3650) -----
interface GigabitEthernet9/0
 description ENLACE-TRONCAL-HACIA-OLT
 ip address 10.0.0.1 255.255.255.252
 ip nat inside
! --- ACTIVAMOS NAT SOBRECARGADO ------
ip nat inside source list 1 interface GigabitEthernet8/0 overload
ip classless
! ---- RUTA POR DEFECTO (SALIDA A INTERNET) --------
ip route 0.0.0.0 0.0.0.0 200.48.1.2 
! ---- RUTA HACIA LA RED DE CLIENTES (VLAN 10 DEL OLT) -----
ip route 192.168.10.0 255.255.255.0 10.0.0.2 
! --- PERMISO A LA RED LAN PARA SALIR ------
access-list 1 permit 192.168.10.0 0.0.0.255
!
end