service timestamps log datetime msec
service timestamps debug datetime msec
service password-encryption
!
hostname OLT-DISTRIBUCION
!--- ACTIVAMOS EL SERVIDOR DHCP -----
ip dhcp pool POOL-INTERNET-FFTH
 network 192.168.10.0 255.255.255.0
 default-router 192.168.10.1
 dns-server 200.48.1.2
! --- PUERTO HACIA EL ROUTER (CORE) ---
interface GigabitEthernet1/1/1
 no switchport
 ip address 10.0.0.2 255.255.255.252
! --- PUERTO QUE PERTENECERA A LA VLAN 10 - CONECTADO AL SPLITTER (HUB) ----
interface GigabitEthernet1/1/2
 switchport access vlan 10
 switchport mode access
! --- CREAMOS LA VLAN 10 -----
interface Vlan10
 description GATEWAY-VLAN-10
 mac-address 00d0.ba04.2001
 ip address 192.168.10.1 255.255.255.0
!
ip classless
! --- RUTA POR DEFECTO DEL OLT (SWITCH) ----
ip route 0.0.0.0 0.0.0.0 10.0.0.1 
!
end